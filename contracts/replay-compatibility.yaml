schema_version: "1.0.0"
current_tool_catalog_version: "1.1.0"
record_schema:
  "1.0.0":
    replayable_under:
      - "1.0.x"
    migration_required: false
    notes: "Initial consolidated replay record compatibility range."
tool_catalog:
  "1.0.0":
    catalog_artifact: "architecture/replay/catalogs/1.0.0.yaml"
    replayable_under:
      - "1.0.x"
    removed_tools: []
    added_tools_after_v1.0.0: []
    notes: "Initial consolidated tool catalog compatibility range."
  "1.1.0":
    catalog_artifact: "architecture/replay/catalogs/1.1.0.yaml"
    replayable_under:
      - "1.1.x"
    removed_tools:
      - tool_name: synthetic-retired-tool
        tool_version: "1.0.0"
        last_active_catalog_version: "1.0.0"
        retired_in_catalog_version: "1.1.0"
        failure_code: REPLAY_TOOL_RETIRED
        row_id: tool_compatibility.tool_retired
    added_tools_after_v1.0.0: []
    notes: "Current replay tool catalog authority for synthetic retired-tool proof."
adapter_catalog:
  "1.0.0":
    replayable_under:
      - "1.0.x"
    breaking_changes: []
    notes: "Initial consolidated adapter catalog compatibility range."
model_artifacts:
  replay_modes:
    mode_1_recorded_io_only:
      model_digest_required: false
      model_digest_recorded_for_provenance: true
      notes: "Recorded I/O replay does not require model artifact availability."
    mode_2_forensic_reexecution:
      model_digest_required: true
      historical_runtime_container_required: true
      notes: "Forensic re-execution is future-scoped and requires historical runtime artifacts."
structured_failure_codes:
  - REPLAY_SCHEMA_INCOMPATIBLE
  - REPLAY_RECORD_FORMAT_INCOMPATIBLE
  - REPLAY_TOOL_RETIRED
  - REPLAY_TOOL_CATALOG_MISMATCH
  - REPLAY_VERDICT_INPUT_HASH_MISMATCH
  - REPLAY_VERDICT_ENVELOPE_HASH_MISMATCH
  - REPLAY_MODEL_VERSION_MISMATCH
  - REPLAY_DECODING_PARAMS_MISMATCH
  - REPLAY_PROMPT_HASH_MISSING
  - REPLAY_PROMPT_HASH_MISMATCH
failure_outcome_rows:
  - row_id: schema_compatibility.record_schema_incompatible
    compatibility_dimension: schema_compatibility
    component: record_schema
    failure_codes:
      - REPLAY_SCHEMA_INCOMPATIBLE
    outcome: fail_closed
    runtime_evidence_required:
      - canonical_replay_failure_record
      - failure_code
      - component
      - field_path
      - expected_version
      - observed_version
  - row_id: schema_compatibility.record_format_incompatible
    compatibility_dimension: schema_compatibility
    component: record_format
    failure_codes:
      - REPLAY_RECORD_FORMAT_INCOMPATIBLE
    outcome: fail_closed
    runtime_evidence_required:
      - canonical_replay_failure_record
      - failure_code
      - component
      - field_path
      - expected_version
      - observed_version
  - row_id: tool_compatibility.tool_retired
