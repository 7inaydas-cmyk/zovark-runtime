name: invariants

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase0-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_contract_manifest.py
      - run: python scripts/check_invariants.py
      - run: python scripts/check_no_unbounded_model_context.py
      - run: python -m pip install pytest
      - run: python -m pytest tests/ -q
